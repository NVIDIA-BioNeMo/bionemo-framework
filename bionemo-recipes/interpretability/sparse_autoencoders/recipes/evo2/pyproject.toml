[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "evo2-sae"
version = "0.1.0"
description = "Sparse Autoencoders for the Evo2 DNA language model"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "sae",
    "torch>=2.0",
    "numpy>=1.20",
    "tqdm>=4.60",
    "pyarrow>=10.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
sae = { workspace = true }
